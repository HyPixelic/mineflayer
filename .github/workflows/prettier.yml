name: Node.js CI (Prettier Check)

on:
  push:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use PNPM Package Manager
        uses: pnpm/action-setup@v6
        with:
          version: 11
      - name: Check formatting via Prettier
        run: pnpm prettier:check
